apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: techblog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: postgres
          image: postgres:13-alpine
          env:
            - name: POSTGRES_DB
              value: techblog
            - name: POSTGRES_USER
              value: bloguser
            - name: POSTGRES_PASSWORD
              value: blogpass123
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: blog-data-pvc

